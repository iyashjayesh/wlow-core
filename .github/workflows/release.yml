name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  container:
    name: Build and push runtime image
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Cross-compile Go binaries
        run: make linux-amd64-bins

      - name: Download wlow-runner binary
        # Download the matching wlow-runner release from wlow/wlow-runner
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p bin/linux-amd64
          gh release download "$TAG" \
            --repo wlow/wlow-runner \
            --pattern "wlow-runner-linux-amd64*" \
            --output bin/linux-amd64/wlow-runner \
            || echo "wlow-runner not found for $TAG — building without it"
          chmod +x bin/linux-amd64/wlow-runner 2>/dev/null || true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.prebuilt
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/wlow/wlow-runtime:${{ steps.tag.outputs.tag }}
            ghcr.io/wlow/wlow-runtime:latest
          labels: |
            org.opencontainers.image.source=https://github.com/wlow/wlow-core
            org.opencontainers.image.version=${{ steps.tag.outputs.tag }}
            org.opencontainers.image.licenses=Apache-2.0
