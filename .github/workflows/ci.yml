name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go build, vet, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet -tags no_wasm ./...

      - name: Build all packages
        run: go build -tags no_wasm ./...

      - name: Build CLI binaries
        run: |
          go build -tags no_wasm -o /dev/null ./cmd/wlow
          go build -tags no_wasm -o /dev/null ./cmd/orchestrator
          go build -tags no_wasm -o /dev/null ./cmd/processor
          go build -tags no_wasm -o /dev/null ./cmd/wlow-runner
          go build -tags no_wasm -o /dev/null ./cmd/wlow-mcp

      - name: Test
        run: go test -short -race -tags no_wasm ./pkg/artifact/... ./pkg/workflow/... ./pkg/sdk/... ./pkg/nats/...

  goreleaser-check:
    name: Validate GoReleaser config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
