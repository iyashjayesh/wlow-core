apiVersion: apps/v1
kind: Deployment
metadata:
  name: wlow-runner
  labels:
    app.kubernetes.io/name: wlow
    app.kubernetes.io/component: runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wlow
      app.kubernetes.io/component: runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wlow
        app.kubernetes.io/component: runner
    spec:
      # KVM runners require a node with /dev/kvm and the wlow.io/kvm=true label.
      # Remove nodeSelector/tolerations for process-only or WASM-only runners.
      nodeSelector:
        wlow.io/kvm: "true"
      tolerations:
        - key: wlow.io/kvm
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: runner
          # Replace with your registry image, e.g.:
          # image: ghcr.io/your-org/wlow-runtime:latest
          image: ghcr.io/wlow/wlow-runtime:latest
          imagePullPolicy: Always
          command: ["/usr/bin/tini", "--", "/usr/local/bin/wlow-runner"]
          env:
            - name: NATS_URL
              value: nats://nats.nats:4222
            - name: STORE_BUCKET
              value: workflow-state
            - name: WORKFLOW_SUBJECT_PREFIX
              value: wlow.workflow
            - name: PROCESSOR_STREAM
              value: WLOW_PROCESSOR
            - name: PROCESSOR_SUBJECT_PREFIX
              value: wlow.processor
            - name: WLOW_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: WLOW_RUNTIMES
              value: microvm,snapshot
            - name: WLOW_DATA_DIR
              value: /var/lib/wlow/data
            # Set WLOW_REGISTRY to your OCI registry prefix for artifact images.
            # - name: WLOW_REGISTRY
            #   value: ghcr.io/your-org/wlow-artifacts
            # Set WLOW_SNAPSHOT_REGISTRY for snapshot images (defaults to WLOW_REGISTRY if unset).
            # - name: WLOW_SNAPSHOT_REGISTRY
            #   value: ghcr.io/your-org/wlow-snapshots
            # IMAGE_PULL_AUTH provides base64-encoded Docker config for private registries.
            # - name: IMAGE_PULL_AUTH
            #   valueFrom:
            #     secretKeyRef:
            #       name: oci-pull-auth
            #       key: IMAGE_PULL_AUTH
            #       optional: true
            - name: WLOW_AGENT_BINARY
              value: /usr/local/bin/wlow-agent
            - name: WLOW_KERNEL_PATH
              value: /var/lib/wlow/kernel/vmlinux
            - name: WLOW_FIRECRACKER_BINARY
              value: /usr/local/bin/firecracker
            - name: WLOW_FIRECRACKER_ENABLE_PCI
              value: "true"
            - name: WLOW_CONCURRENCY
              value: "2"
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsUser: 0
          volumeMounts:
            - name: kvm
              mountPath: /dev/kvm
            - name: wlow-data
              mountPath: /var/lib/wlow/data
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 8Gi
      volumes:
        - name: kvm
          hostPath:
            path: /dev/kvm
            type: CharDevice
        - name: wlow-data
          emptyDir: {}
